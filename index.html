<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pengumuman Hasil TKA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#1e3a8a,#0f172a);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      text-align:center;
      padding:20px;
    }

    h1{
      margin-bottom:15px;
      font-size:32px;
    }

    p{
      margin-bottom:25px;
      opacity:0.9;
    }

    button{
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#16a34a;
    }

    .popup{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      padding:15px;
    }

    .popup-content{
      background:white;
      color:black;
      width:100%;
      max-width:450px;
      padding:30px;
      border-radius:18px;
      animation:muncul 0.3s ease;
      max-height:90vh;
      overflow:auto;
    }

    @keyframes muncul{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    input{
      width:100%;
      padding:12px;
      margin-top:15px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .hasil{
      margin-top:20px;
      background:#f1f5f9;
      padding:15px;
      border-radius:12px;
      display:none;
    }

    .nama{
      text-align:center;
      margin-bottom:15px;
      color:#1e3a8a;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th, td{
      border:1px solid #cbd5e1;
      padding:10px;
      text-align:center;
      font-size:14px;
    }

    th{
      background:#dbeafe;
    }

    .close{
      margin-top:15px;
      background:#ef4444;
      width:100%;
    }

    .close:hover{
      background:#dc2626;
    }

    .footer{
      margin-top:15px;
      font-size:12px;
      color:#64748b;
      text-align:center;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Pengumuman Hasil TKA</h1>

    <p>SDS Cahaya Islam Tahun 2026</p>

    <button onclick="bukaPopup()">Lihat Hasil</button>

  </div>

  <!-- POPUP -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <div style="text-align:center; margin-bottom:20px;">

        <h1 style="
          color:#1e3a8a;
          font-size:30px;
          margin-bottom:5px;
        ">
          Hasil TKA

          font-size:16px;
          margin-bottom:20px;

        <div style="
          background:#eff6ff;
          padding:14px;
          border-radius:14px;
          color:#1e3a8a;
          font-size:14px;
          line-height:1.6;
        ">
          Tetap semangat melangkah menuju jenjang berikutnya.
          Terus belajar, berkembang, dan raih cita-cita terbaikmu.
        </div>

      </div>

      <input type="text" id="nisn" placeholder="Masukkan NISN">

      <button style="margin-top:15px; width:100%;" onclick="cekHasil()">
        Masuk
      </button>

      <div class="hasil" id="hasil">

        <h2 class="nama" id="namaSiswa"></h2>

        <table>

          <tr>
            <th>Mata Pelajaran</th>
            <th>Nilai</th>
            <th>Predikat</th>
          </tr>

          <tr>
            <td>Matematika</td>
            <td id="mtkNilai"></td>
            <td id="mtkPredikat"></td>
          </tr>

          <tr>
            <td>Bahasa Indonesia</td>
            <td id="indoNilai"></td>
            <td id="indoPredikat"></td>
          </tr>

        </table>

      </div>

      <button class="close" onclick="tutupPopup()">Tutup</button>

      <div class="footer">
        © SDS Cahaya Islam
      </div>

    </div>

  </div>

          siswa.nama;

          siswa.matematika.nilai;

        document.getElementById("mtkPredikat").innerText =
          siswa.matematika.predikat;

        document.getElementById("indoNilai").innerText =
          siswa.indonesia.nilai;

        document.getElementById("indoPredikat").innerText =
          siswa.indonesia.predikat;

          "block";

        alert("NISN tidak ditemukan!");
